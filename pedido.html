<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu pedido — BDI Accesorios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F3F4F6; --surface: #FFFFFF; --border: #E5E7EB; --border-strong: #D1D5DB;
    --text: #111827; --text-muted: #6B7280; --text-hint: #9CA3AF; --accent: #111827;
    --radius: 12px; --radius-sm: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 1.25rem; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 560px; margin: 0 auto; }
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,0.06); overflow: hidden; }
  .head { padding: 1.5rem; border-bottom: 1px solid var(--border); text-align: center; }
  .head img { height: 46px; width: auto; margin-bottom: 0.75rem; }
  .head .num { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 600; }
  .head .fecha { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .head .sync-note { font-size: 11px; color: #16A34A; font-weight: 600; margin-top: 4px; }
  .datos { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
  .datos .item { font-size: 13px; }
  .datos .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); }
  .datos .val { color: var(--text); margin-top: 1px; }
  .items { padding: 0.5rem 1.5rem; }
  .items .vacio { padding: 1.5rem 0; text-align: center; font-size: 13px; color: var(--text-muted); }
  .row { display: flex; align-items: center; gap: 12px; padding: 0.85rem 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row .chk { display: none; width: 18px; height: 18px; flex-shrink: 0; margin: 0; cursor: pointer; accent-color: var(--accent); }
  .row .thumb { width: 48px; height: 48px; border-radius: var(--radius-sm); background: var(--bg); flex-shrink: 0; object-fit: contain; }
  .row .info { flex: 1; min-width: 0; }
  .row .nombre { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .row .variante { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .row .qtyprice { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .row .qtyprice .q { font-weight: 600; color: var(--text); }
  .row .subtotal { font-size: 13px; font-weight: 700; white-space: nowrap; }
  /* Barra de controles (no se imprime) */
  .tools { background: var(--surface); border-radius: var(--radius); box-shadow: 0 4px 24px rgba(0,0,0,0.06); padding: 0.85rem 1rem; margin-bottom: 0.9rem; display: flex; flex-wrap: wrap; gap: 8px 10px; align-items: center; }
  .tools input[type="text"], .tools select { padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; color: var(--text); background: white; outline: none; }
  .tools input[type="text"] { flex: 1; min-width: 150px; }
  .tools input[type="text"]:focus, .tools select:focus { border-color: var(--accent); }
  .tools .remito-toggle { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text); cursor: pointer; user-select: none; white-space: nowrap; }
  .tools .contador { flex-basis: 100%; font-size: 12px; color: var(--text-muted); }
  /* Modo remito: sin precios, con casilleros */
  body.sin-precios .row .chk { display: inline-block; }
  body.sin-precios .row .qtyprice .p,
  body.sin-precios .subtotal,
  body.sin-precios .total,
  body.sin-precios .cupon-bloque { display: none !important; }
  @media print {
    body { background: white; padding: 0; }
    .card { box-shadow: none; }
    .actions, .tools { display: none !important; }
    .row .chk { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    body.sin-precios .row .chk { display: inline-block; -webkit-appearance: none; appearance: none; width: 14px; height: 14px; border: 1.5px solid #111; border-radius: 3px; background: #fff; }
    /* Filas compactas al imprimir: menos alto por renglón = menos hojas */
    .head { padding: 0.6rem 1.5rem; }
    .head img { height: 34px; margin-bottom: 0.35rem; }
    .datos { padding: 0.5rem 1.5rem; gap: 4px 16px; }
    .items { padding: 0 1.5rem; }
    .row { padding: 3px 0; gap: 8px; }
    .row .thumb { width: 26px; height: 26px; }
    .row .nombre { font-size: 11px; line-height: 1.15; }
    .row .variante, .row .qtyprice { font-size: 10px; line-height: 1.15; margin-top: 0; }
    .row .subtotal { font-size: 11px; }
    /* Remito (sin precios): sin fotos para máxima densidad */
    body.sin-precios .row .thumb { display: none; }
  }
  .cupon-bloque { padding: 0.75rem 1.5rem; border-top: 1px dashed var(--border-strong); font-size: 13px; }
  .cupon-sub, .cupon-desc { display: flex; justify-content: space-between; }
  .cupon-sub { color: var(--text-muted); }
  .cupon-desc { color: #16A34A; font-weight: 600; margin-top: 3px; }
  .cupon-line.envio { color: #16A34A; font-weight: 600; }
  .cupon-bloque .cod { color: var(--text-muted); font-weight: 400; font-size: 11px; }
  .total { padding: 1rem 1.5rem; border-top: 2px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center; }
  .total .lbl { font-size: 14px; font-weight: 600; }
  .total .amount { font-size: 22px; font-weight: 700; color: var(--accent); }
  .obs { padding: 0 1.5rem 1.25rem; font-size: 12px; color: var(--text-muted); }
  .obs .lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-hint); margin-bottom: 2px; }
  .actions { max-width: 560px; margin: 1rem auto 0; }
  .btn { display: block; width: 100%; padding: 13px; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; text-decoration: none; }
  .btn-dl { background: var(--accent); color: white; }
  .state { text-align: center; padding: 3rem 1.5rem; color: var(--text-muted); }
  .state .ic { font-size: 36px; margin-bottom: 0.75rem; }
  .state h2 { font-size: 17px; color: var(--text); margin-bottom: 0.4rem; }
  .state p { font-size: 13px; }
  .foot { text-align: center; font-size: 11px; color: var(--text-hint); margin-top: 1.25rem; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="tools" id="tools" style="display:none">
      <input type="text" id="buscar" placeholder="Buscar producto o modelo…" oninput="renderItems()" />
      <select id="orden" onchange="renderItems()">
        <option value="original">Como se pidió</option>
        <option value="nombre">Nombre (A-Z)</option>
        <option value="modelo">Por modelo</option>
      </select>
      <label class="remito-toggle"><input type="checkbox" id="sin-precios" onchange="toggleSinPrecios()" /> Ocultar precios (remito)</label>
      <div class="contador" id="contador"></div>
    </div>
    <div class="card" id="card">
      <div class="state"><div class="ic">⏳</div><p>Cargando tu pedido…</p></div>
    </div>
    <div class="actions" id="actions" style="display:none">
      <button class="btn btn-dl" onclick="imprimirConPrecios()" style="margin-bottom:8px">📄 Imprimir con precios</button>
      <button class="btn btn-dl" onclick="imprimirSinPrecios()" style="background:var(--surface);color:var(--text);border:1px solid var(--border-strong)">📦 Imprimir remito (sin precios)</button>
    </div>
    <div class="foot">BDI Accesorios · Catálogo Mayorista</div>
  </div>

<script>
function fmt(n) { return '$' + Number(n || 0).toLocaleString('es-AR'); }
function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

// Ítems del pedido (con su índice original para el orden "como se pidió").
let todosItems = [];

function renderItems() {
  const cont = document.getElementById('items-container');
  if (!cont) return;
  const q = (document.getElementById('buscar').value || '').trim().toLowerCase();
  const orden = document.getElementById('orden').value;

  let lista = todosItems.filter(function (i) {
    if (!q) return true;
    return ((i.nombre || '') + ' ' + (i.variante || '')).toLowerCase().includes(q);
  });

  if (orden === 'nombre') {
    lista = lista.slice().sort(function (a, b) {
      return (a.nombre || '').localeCompare(b.nombre || '', 'es', { numeric: true }) ||
             (a.variante || '').localeCompare(b.variante || '', 'es', { numeric: true });
    });
  } else if (orden === 'modelo') {
    lista = lista.slice().sort(function (a, b) {
      const av = a.variante || '', bv = b.variante || '';
      if (!av && bv) return 1;   // los sin modelo, al final
      if (av && !bv) return -1;
      return av.localeCompare(bv, 'es', { numeric: true }) ||
             (a.nombre || '').localeCompare(b.nombre || '', 'es', { numeric: true });
    });
  } // 'original' → queda como todosItems (ya vienen en orden)

  if (!lista.length) {
    cont.innerHTML = '<div class="vacio">No hay productos que coincidan con la búsqueda.</div>';
  } else {
    cont.innerHTML = lista.map(function (i) {
      const subtotal = (i.precio || 0) * (i.cantidad || 0);
      const thumb = i.img
        ? '<img class="thumb" src="' + esc(i.img) + '" alt="" onerror="this.style.visibility=\'hidden\'">'
        : '<div class="thumb"></div>';
      return '<div class="row">' +
        '<input type="checkbox" class="chk" aria-label="Preparado">' +
        thumb +
        '<div class="info">' +
          '<div class="nombre">' + esc(i.nombre) + '</div>' +
          (i.variante ? '<div class="variante">' + esc(i.variante) + '</div>' : '') +
          '<div class="qtyprice"><span class="q">' + (i.cantidad || 0) + ' u.</span><span class="p"> · ' + fmt(i.precio) + ' c/u</span></div>' +
        '</div>' +
        '<div class="subtotal">' + fmt(subtotal) + '</div>' +
      '</div>';
    }).join('');
  }

  const nProd = lista.length;
  const nUnid = lista.reduce(function (s, i) { return s + (i.cantidad || 0); }, 0);
  document.getElementById('contador').textContent = nProd + (nProd === 1 ? ' producto' : ' productos') + ' · ' + nUnid + (nUnid === 1 ? ' unidad' : ' unidades');
}

function toggleSinPrecios() {
  document.body.classList.toggle('sin-precios', document.getElementById('sin-precios').checked);
}

function imprimirConPrecios() {
  document.getElementById('sin-precios').checked = false;
  document.body.classList.remove('sin-precios');
  window.print();
}
function imprimirSinPrecios() {
  document.getElementById('sin-precios').checked = true;
  document.body.classList.add('sin-precios');
  window.print();
}

// En segundo plano relee el pedido desde Gestión Nube y, si hubo cambios, los
// refleja (ítems, total, cupón). Si falla, se queda con lo que ya se mostró.
async function refrescarDesdeGN(id) {
  if (id == null || id === '') return;
  try {
    const r = await fetch('/api/pedido?id=' + encodeURIComponent(id) + '&refresh=1');
    if (!r.ok) return;
    const p = await r.json();
    // Solo tocamos la pantalla si GN devolvió una relectura real (sincronizado).
    // Si la venta no existe / GN falló, dejamos la versión ya mostrada, sin nota.
    if (!p || !p.sincronizado || !Array.isArray(p.items)) return;
    todosItems = p.items;
    renderItems();
    const ta = document.getElementById('total-amount');
    if (ta) ta.textContent = fmt(p.total);
    const slot = document.getElementById('cupon-slot');
    if (slot) slot.innerHTML = cuponBloque(p);
    const note = document.getElementById('sync-note');
    if (note) { note.textContent = '✓ Actualizado'; note.style.display = 'block'; }
  } catch (e) { /* sin conexión con GN: queda la versión guardada */ }
}

function cuponBloque(pedido) {
  const c = pedido.cupon;
  if (!c) return '';
  if (c.tipo === 'envio') {
    return '<div class="cupon-bloque"><div class="cupon-line envio">🚚 Envío bonificado' +
      (c.detalle ? ' · ' + c.detalle : '') + ' <span class="cod">(' + c.codigo + ')</span></div></div>';
  }
  const sub = pedido.subtotal != null ? pedido.subtotal : pedido.total;
  return '<div class="cupon-bloque">' +
    '<div class="cupon-sub"><span>Subtotal</span><span>' + fmt(sub) + '</span></div>' +
    '<div class="cupon-desc"><span>Descuento <span class="cod">(' + c.codigo + (c.detalle ? ' · ' + c.detalle : '') + ')</span></span><span>-' + fmt(c.descuento || 0) + '</span></div>' +
  '</div>';
}

function getId() {
  const parts = location.pathname.split('/').filter(Boolean);
  if (parts[0] === 'pedido' && parts[1]) return decodeURIComponent(parts[1]);
  return new URLSearchParams(location.search).get('id');
}

function fechaLinda(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' }) +
      ' · ' + d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) + ' hs';
  } catch (e) { return ''; }
}

function errorBox(titulo, msg) {
  document.getElementById('card').innerHTML =
    '<div class="state"><div class="ic">🔍</div><h2>' + titulo + '</h2><p>' + msg + '</p></div>';
}

async function cargar() {
  const id = getId();
  if (!id) { errorBox('Pedido no encontrado', 'El link no es válido.'); return; }

  let pedido;
  try {
    const r = await fetch('/api/pedido?id=' + encodeURIComponent(id));
    if (!r.ok) {
      errorBox('Pedido no disponible', r.status === 404
        ? 'Este pedido no existe o el link ya venció (los links duran 90 días).'
        : 'No se pudo cargar el pedido. Probá de nuevo en un rato.');
      return;
    }
    pedido = await r.json();
  } catch (e) {
    errorBox('Sin conexión', 'No se pudo cargar el pedido. Revisá tu conexión e intentá de nuevo.');
    return;
  }

  document.title = 'Pedido N° ' + pedido.id + ' — BDI Accesorios';
  todosItems = pedido.items || [];

  const datos =
    '<div class="item"><div class="lbl">Cliente</div><div class="val">' + (pedido.cliente || '—') + '</div></div>' +
    '<div class="item"><div class="lbl">Teléfono</div><div class="val">' + (pedido.telefono || '—') + '</div></div>' +
    '<div class="item"><div class="lbl">Pago</div><div class="val">' + (pedido.pago || '—') + '</div></div>' +
    '<div class="item"><div class="lbl">Entrega</div><div class="val">' + (pedido.entrega || '—') + '</div></div>';

  document.getElementById('card').innerHTML =
    '<div class="head">' +
      '<img src="/logo.png" alt="BDI Accesorios" onerror="this.style.display=\'none\'">' +
      '<div class="num">Pedido N° ' + pedido.id + '</div>' +
      '<div class="fecha">' + fechaLinda(pedido.fecha) + '</div>' +
      '<div class="sync-note" id="sync-note" style="display:none"></div>' +
    '</div>' +
    '<div class="datos">' + datos + '</div>' +
    '<div class="items" id="items-container"></div>' +
    '<div id="cupon-slot">' + cuponBloque(pedido) + '</div>' +
    '<div class="total"><span class="lbl">Total del pedido</span><span class="amount" id="total-amount">' + fmt(pedido.total) + '</span></div>' +
    (pedido.obs ? '<div class="obs"><div class="lbl">Observaciones</div>' + esc(pedido.obs) + '</div>' : '');

  renderItems();
  refrescarDesdeGN(pedido.id);   // en segundo plano: trae lo último de GN
  document.getElementById('tools').style.display = 'flex';
  document.getElementById('actions').style.display = 'block';
}

cargar();
</script>
</body>
</html>
